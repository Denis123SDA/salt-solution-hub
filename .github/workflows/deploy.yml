name: Deploy to Timeweb

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      SSH_PORT: ${{ secrets.SSH_PORT != '' && secrets.SSH_PORT || '22' }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_TARGET_DIR: ${{ secrets.SSH_TARGET_DIR }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Setup SSH
        run: |
          set -eu
          [ -n "$SSH_HOST" ] || { echo "SSH_HOST secret is empty"; exit 1; }
          [ -n "$SSH_PRIVATE_KEY" ] || { echo "SSH_PRIVATE_KEY secret is empty"; exit 1; }
          install -d -m 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null || {
            echo "SSH_PRIVATE_KEY is invalid or passphrase-protected";
            exit 1;
          }
          touch ~/.ssh/known_hosts
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          set -eu
          [ -n "$SSH_USER" ] || { echo "SSH_USER secret is empty"; exit 1; }
          [ -n "$SSH_TARGET_DIR" ] || { echo "SSH_TARGET_DIR secret is empty"; exit 1; }
          rsync -avz --delete -e "ssh -p $SSH_PORT" dist/ \
          "$SSH_USER@$SSH_HOST:$SSH_TARGET_DIR/"
