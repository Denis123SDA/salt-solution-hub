<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Страница не найдена | Севуч Плюс</title>
    <meta name="robots" content="noindex,follow" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <style>
      :root {
        --background: hsl(48 100% 98%);
        --foreground: hsl(220 18% 12%);
        --muted: hsl(45 40% 94%);
        --muted-foreground: hsl(220 10% 36%);
        --card: hsl(0 0% 100%);
        --border: hsl(45 24% 86%);
        --primary: hsl(47 98% 53%);
        --primary-foreground: hsl(220 18% 12%);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: radial-gradient(circle at top, hsl(48 100% 96%), hsl(48 60% 92%) 38%, var(--background));
        color: var(--foreground);
        padding: 20px;
      }
      .card {
        width: min(100%, 720px);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 28px;
        padding: 36px;
        text-align: center;
        box-shadow: 0 24px 60px hsla(220, 18%, 12%, 0.08);
      }
      .code {
        display: inline-block;
        padding: 8px 14px;
        border-radius: 999px;
        background: hsla(47, 98%, 53%, 0.18);
        font-weight: 800;
        letter-spacing: .08em;
      }
      h1 { margin: 18px 0 10px; font-size: clamp(36px, 6vw, 64px); line-height: 1; }
      p { margin: 0 auto; max-width: 520px; color: var(--muted-foreground); }
      .actions { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 26px; }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 14px 20px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 700;
      }
      .btn-primary { background: var(--primary); color: var(--primary-foreground); }
      .btn-secondary { background: transparent; color: var(--foreground); border: 1px solid var(--border); }
    </style>
  </head>
  <body>
    <main class="card">
      <span class="code">404</span>
      <h1>Страница не найдена</h1>
      <p>Проверьте адрес страницы или вернитесь на главную. Если вы перешли по старой ссылке, нужный раздел мог быть перенесён.</p>
      <div class="actions">
        <a class="btn btn-primary" href="/">На главную</a>
        <a class="btn btn-secondary" href="/privacy/">Политика</a>
      </div>
    </main>
  </body>
</html>
